name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.10
      - name: Install link checker
        run: pip install markdown-link-check
      - name: Check links in PDK_RESOURCES.md
        run: markdown-link-check PDK_RESOURCES.md || true
